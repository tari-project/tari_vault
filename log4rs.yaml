# log4rs configuration for tari_vault
# Reference: https://docs.rs/log4rs
#
# To use this file, either pass --log-config log4rs.yaml to the binary
# or set VAULT__LOGGING__CONFIG_FILE=log4rs.yaml in your environment.

appenders:
  console:
    kind: console
    encoder:
      pattern: "{d(%Y-%m-%dT%H:%M:%S%.3fZ)(utc)} {h({l:<5})} {t} — {m}{n}"

  file:
    kind: file
    path: "logs/tari_vault.log"
    encoder:
      pattern: "{d(%Y-%m-%dT%H:%M:%S%.3fZ)(utc)} {l:<5} {t} — {m}{n}"

root:
  level: info
  appenders:
    - console

loggers:
  # Vault business logic — set to debug for detailed operation traces.
  # WARNING: even at debug level this logger NEVER emits Claim_IDs or
  # proof content — only non-sensitive record_id hex values.
  tari_vault::vault:
    level: info
    appenders:
      - console
    additive: false

  tari_vault::rpc:
    level: info
    appenders:
      - console
    additive: false
